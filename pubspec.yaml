name: fleet1_app
description: "Fleet1 - India's Smartest B2B Logistics Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
